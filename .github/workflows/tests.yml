name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    # A passing suite finishes in a couple of minutes; anything approaching this
    # is a hang, and failing fast is cheaper than burning an hour of runner time.
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        # Two axes are being covered here, and they are independent of each other.
        #
        # The PHP/Laravel/Filament legs prove the *package* against its supported
        # peers. Filament is an optional peer supported on both its current majors,
        # so each is pinned on a leg of its own: left to resolve freely, Composer
        # would take the newer every time and the older would go untested.
        #
        # The `postgres` legs prove the *SQL* against every supported server major.
        # Vacuum's value is the correctness of queries against system catalogs, and
        # those catalogs drift between releases: reltuples = -1 arrived in 14,
        # pg_stat_io in 16, and the vacuum-progress column rename in 17. A cross
        # product of both axes would be sixteen legs proving nothing extra — catalog
        # drift cannot depend on the PHP version — so the database majors ride a
        # single fixed peer combination instead.
        include:
          - php: '8.3'
            laravel: '11.*'
            testbench: '9.*'
            filament: '^4.0'
            postgres: '17'
          - php: '8.4'
            laravel: '11.*'
            testbench: '9.*'
            filament: '^5.0'
            postgres: '17'
          - php: '8.3'
            laravel: '12.*'
            testbench: '10.*'
            filament: '^4.0'
            postgres: '17'
          # Coverage is identical across the version matrix, so it is collected on
          # a single leg rather than recomputed four times.
          - php: '8.4'
            laravel: '12.*'
            testbench: '10.*'
            filament: '^5.0'
            postgres: '17'
            coverage: true
          # Laravel 13 legs. pest-plugin-laravel caps at Laravel 12 until its v4,
          # so supporting 13 requires widening the Pest dev-deps to `|| ^4.0`;
          # Composer then resolves Pest 4 / PHPUnit 12 on every leg, not just
          # these. Both Filament majors are proven here as on the other rows.
          - php: '8.3'
            laravel: '13.*'
            testbench: '11.*'
            filament: '^4.0'
            postgres: '17'
          - php: '8.4'
            laravel: '13.*'
            testbench: '11.*'
            filament: '^5.0'
            postgres: '17'
          # Database-only legs. Lint, Rector, PHPStan and type coverage are all
          # Postgres-version-independent, so they are skipped here rather than run
          # three more times for an identical result; these legs exist to run the
          # suite's real-database queries against the older majors.
          - php: '8.4'
            laravel: '12.*'
            testbench: '10.*'
            filament: '^5.0'
            postgres: '14'
            database-only: true
          - php: '8.4'
            laravel: '12.*'
            testbench: '10.*'
            filament: '^5.0'
            postgres: '15'
            database-only: true
          - php: '8.4'
            laravel: '12.*'
            testbench: '10.*'
            filament: '^5.0'
            postgres: '16'
            database-only: true

    name: PG ${{ matrix.postgres }} / PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }} / Filament ${{ matrix.filament }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Started by hand rather than as a service container: pg_stat_statements is
      # loaded at startup, and a service container cannot be given command
      # arguments. The major comes from the matrix so that a catalog which moved
      # between releases is caught here rather than by a user.
      - name: Start PostgreSQL ${{ matrix.postgres }}
        run: |
          docker run --detach --name postgres \
            --publish 5432:5432 \
            --env POSTGRES_DB=vacuum_test \
            --env POSTGRES_USER=vacuum \
            --env POSTGRES_PASSWORD=secret \
            postgres:${{ matrix.postgres }} -c shared_preload_libraries=pg_stat_statements

          until docker exec postgres pg_isready --username vacuum --quiet; do sleep 1; done

          docker exec postgres psql --username vacuum --dbname vacuum_test \
            --command 'CREATE EXTENSION pg_stat_statements'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_pgsql, pgsql
          # PCOV is many times faster than Xdebug for line coverage, which is all
          # `--min=100` needs; legs that do not collect coverage carry no driver at
          # all so nothing instruments their run.
          coverage: ${{ matrix.coverage && 'pcov' || 'none' }}

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ matrix.php }}-${{ matrix.laravel }}-filament${{ matrix.filament }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ matrix.php }}-${{ matrix.laravel }}-filament${{ matrix.filament }}-
            composer-${{ matrix.php }}-${{ matrix.laravel }}-
            composer-${{ matrix.php }}-

      - name: Install dependencies
        run: |
          composer require --dev "orchestra/testbench:${{ matrix.testbench }}" "filament/filament:${{ matrix.filament }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress --with-all-dependencies

      - name: Lint
        if: ${{ ! matrix.database-only }}
        run: composer test:lint

      - name: Refactor check
        if: ${{ ! matrix.database-only }}
        run: composer test:refacto

      - name: Static analysis
        if: ${{ ! matrix.database-only }}
        run: composer test:types

      - name: Type coverage
        if: ${{ ! matrix.database-only }}
        run: composer test:type-coverage

      # Only the coverage leg pays for line-coverage collection and the 100%
      # gate; the other legs run the same tests without instrumentation.
      - name: Unit tests
        run: ${{ matrix.coverage && 'composer test:unit' || 'vendor/bin/pest --colors=always' }}
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: vacuum_test
          DB_USERNAME: vacuum
          DB_PASSWORD: secret
